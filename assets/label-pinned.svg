<svg width="800" height="80" viewBox="0 0 800 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#04020e"/>
      <stop offset="80%" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="accentL" x1="0%" y1="0%" x2="0%" y2="80%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="80%" stop-color="#b44fff"/>
    </linearGradient>
    <linearGradient id="accentR" x1="0%" y1="0%" x2="0%" y2="80%">
      <stop offset="0%" stop-color="#b44fff"/>
      <stop offset="80%" stop-color="#FF2D78"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card">
      <rect width="800" height="80" rx="12"/>
    </clipPath>
  </defs>

  <rect width="800" height="80" fill="url(#bg)" rx="12"/>

  <g clip-path="url(#card)">
    <rect x="0" y="0" width="3" height="80" fill="url(#accentL)"/>
    <rect x="797" y="0" width="3" height="80" fill="url(#accentR)"/>

    <!-- Section label -->
    <text x="30" y="36" font-family="'Courier New', monospace" font-size="11" fill="#00f5ff" letter-spacing="3" opacity="0.9">// PINNED</text>
    <line x1="15" y1="51" x2="780" y2="51" stroke="#1a1030" stroke-width="1"/>

    
  </g>

  <rect width="800" height="80" fill="none" stroke="#1a1030" stroke-width="1" rx="12"/>
</svg>
