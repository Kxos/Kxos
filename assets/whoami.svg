<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04020e"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="accentL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF2D78"/>
      <stop offset="100%" stop-color="#b44fff"/>
    </linearGradient>
    <linearGradient id="accentR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#b44fff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card">
      <rect width="800" height="300" rx="12"/>
    </clipPath>
  </defs>

  <rect width="800" height="300" fill="url(#bg)" rx="12"/>

  <g clip-path="url(#card)">
    <!-- Left accent bar -->
    <rect x="0" y="0" width="3" height="300" fill="url(#accentL)"/>
    <!-- Right accent bar -->
    <rect x="797" y="0" width="3" height="300" fill="url(#accentR)"/>

    <!-- Section label -->
    <text x="30" y="36" font-family="'Courier New', monospace" font-size="11" fill="#FF2D78" letter-spacing="3" opacity="0.9">// WHOAMI</text>
    <line x1="15" y1="51" x2="780" y2="51" stroke="#1a1030" stroke-width="1"/>

    <!-- LEFT COLUMN: Identity -->
    <!-- name -->
    <text x="30" y="72" font-family="'Courier New', monospace" font-size="11" fill="#4a4470" letter-spacing="2">NAME</text>
    <text x="160" y="72" font-family="'Courier New', monospace" font-size="13" fill="#f0ecff" font-weight="bold">Vito Iannone</text>

    <!-- alias -->
    <text x="30" y="100" font-family="'Courier New', monospace" font-size="11" fill="#4a4470" letter-spacing="2">ALIAS</text>
    <text x="160" y="100" font-family="'Courier New', monospace" font-size="13" fill="#FF2D78" filter="url(#glow)">Kxos</text>

    <!-- location -->
    <text x="30" y="128" font-family="'Courier New', monospace" font-size="11" fill="#4a4470" letter-spacing="2">LOCATION</text>
    <text x="160" y="128" font-family="'Courier New', monospace" font-size="13" fill="#9b93c8">Bari, Italia 🇮🇹</text>

    <!-- role -->
    <text x="30" y="156" font-family="'Courier New', monospace" font-size="11" fill="#4a4470" letter-spacing="2">ROLE</text>
    <text x="160" y="156" font-family="'Courier New', monospace" font-size="13" fill="#00f5ff">FE Team Lead &amp; Full Stack Dev</text>

    <!-- company -->
    <text x="30" y="184" font-family="'Courier New', monospace" font-size="11" fill="#4a4470" letter-spacing="2">COMPANY</text>
    <text x="160" y="184" font-family="'Courier New', monospace" font-size="13" fill="#9b93c8">DXC Technology  <tspan fill="#4a4470">·</tspan>  Giu 2022 — presente</text>

    <!-- focus -->
    <text x="30" y="212" font-family="'Courier New', monospace" font-size="11" fill="#4a4470" letter-spacing="2">FOCUS</text>
    <text x="160" y="212" font-family="'Courier New', monospace" font-size="13" fill="#9b93c8">Scalable Systems  <tspan fill="#4a4470">·</tspan>  High-Impact UI  <tspan fill="#4a4470">·</tspan>  Team Leadership</text>

    <!-- currently -->
    <text x="30" y="240" font-family="'Courier New', monospace" font-size="11" fill="#4a4470" letter-spacing="2">NOW</text>
    <text x="160" y="240" font-family="'Courier New', monospace" font-size="12" fill="#b44fff">kxos.github.io — synthwave portfolio con arcade integrato</text>

    <!-- Divider line before motto -->
    <line x1="30" y1="260" x2="770" y2="260" stroke="#1a1030" stroke-width="1"/>

    <!-- motto -->
    <text x="400" y="283" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#FF2D78" letter-spacing="3" opacity="0.7">// dal backend al pixel finale.</text>

    <!-- Blinking cursor after motto -->
    <rect x="595" y="273" width="8" height="2" fill="#FF2D78" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect width="800" height="300" fill="none" stroke="#1a1030" stroke-width="1" rx="12"/>
</svg>
